services:
  redis:
    image: redis:latest
    container_name: chaos_tuner_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  agent_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chaos_tuner_agent_app
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    depends_on:
      - redis
    ports:
      - "8000:8000"
    command: ["python", "-m", "src.agent.graph"]
    restart: "no"
